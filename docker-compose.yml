# New-API Docker Compose Configuration
#
# Quick Start:
#   1. docker-compose up -d
#   2. Access at http://localhost:6523 (端口已改为6523)
#
# ⚠️  IMPORTANT: Change all default passwords before deploying to production!
services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aigod-new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "6523:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    env_file:
      - .env  # 自动读取 .env 文件中的环境变量
    environment:
      SQL_DSN: ${SQL_DSN:?SQL_DSN is required}
      REDIS_CONN_STRING: ${REDIS_CONN_STRING:?REDIS_CONN_STRING is required}
      TZ: ${TZ:?TZ is required}
      MAX_REQUEST_BODY_MB: ${MAX_REQUEST_BODY_MB:?MAX_REQUEST_BODY_MB is required}
      STREAM_SCANNER_MAX_BUFFER_MB: ${STREAM_SCANNER_MAX_BUFFER_MB:?STREAM_SCANNER_MAX_BUFFER_MB is required}
      ERROR_LOG_ENABLED: ${ERROR_LOG_ENABLED:?ERROR_LOG_ENABLED is required}
      BATCH_UPDATE_ENABLED: ${BATCH_UPDATE_ENABLED:?BATCH_UPDATE_ENABLED is required}
      STREAMING_TIMEOUT: ${STREAMING_TIMEOUT:?STREAMING_TIMEOUT is required}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      R2_VIDEO_UPLOAD_ENABLED: ${R2_VIDEO_UPLOAD_ENABLED:?R2_VIDEO_UPLOAD_ENABLED is required}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:?R2_ACCOUNT_ID is required}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:?R2_BUCKET_NAME is required}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:?R2_ACCESS_KEY_ID is required}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:?R2_SECRET_ACCESS_KEY is required}
      R2_REGION: ${R2_REGION:?R2_REGION is required}
      R2_VIDEO_EXPIRY_DAYS: ${R2_VIDEO_EXPIRY_DAYS:?R2_VIDEO_EXPIRY_DAYS is required}
      R2_PUBLIC_DOMAIN: ${R2_PUBLIC_DOMAIN:?R2_PUBLIC_DOMAIN is required}
      VIDEO_PROXY_PUBLIC_BASE_URL: ${VIDEO_PROXY_PUBLIC_BASE_URL:?VIDEO_PROXY_PUBLIC_BASE_URL is required}
    networks:
      - 1panel-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  1panel-network:
    external: true
    name: 1panel-network  # 1Panel 创建的 Docker 网络名称
